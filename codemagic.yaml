workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Set up local.properties
        script: |
          # هذا السطر هو الحل! سيقوم بكتابة المسار الصحيح للسيرفر
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter clean
          flutter build apk --release --no-tree-shake-icons --ignore-deprecation
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
