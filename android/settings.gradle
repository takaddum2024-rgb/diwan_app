pluginManagement {
    // محاولة قراءة من local.properties إذا كان موجوداً (للتطوير المحلي)
    def flutterSdkPathFromProps = null
    def localPropsFile = file("local.properties")
    if (localPropsFile.exists()) {
        def properties = new Properties()
        localPropsFile.withInputStream { properties.load(it) }
        flutterSdkPathFromProps = properties.getProperty("flutter.sdk")
    }
    
    // استخدام متغير البيئة إذا لم يتم العثور على المسار في local.properties
    def flutterSdkPath = flutterSdkPathFromProps ?: System.getenv('FLUTTER_ROOT')
    
    // إذا كان لا يزال فارغاً، استخدم مساراً افتراضياً لـ GitHub Actions
    if (flutterSdkPath == null) {
        flutterSdkPath = "/opt/hostedtoolcache/flutter/stable-stable/stable"
        println "WARNING: Using default Flutter SDK path for CI: ${flutterSdkPath}"
    }
    
    settings.ext.flutterSdkPath = flutterSdkPath
    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.1.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
apply from: "${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle"
