pluginManagement {
    // استخدام متغير البيئة FLUTTER_ROOT الموجود في GitHub Actions
    def flutterSdkPath = System.getenv('FLUTTER_ROOT')
    
    // مسار افتراضي لـ GitHub Actions إذا لم يتم تعيين المتغير
    if (flutterSdkPath == null || flutterSdkPath.isEmpty()) {
        flutterSdkPath = "/opt/hostedtoolcache/flutter/stable-stable/stable"
        println "WARNING: Using default Flutter SDK path for CI: ${flutterSdkPath}"
    }
    
    // ✅ المسار الصحيح لمكون Flutter Gradle
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.1.1" apply false
    id "org.jetbrains.kotlin.android" version "2.0.0" apply false  // تحديث إصدار Kotlin
}

include ":app"
apply from: "${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle"
